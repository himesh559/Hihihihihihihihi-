<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    font-family:Arial,sans-serif;
    overflow:hidden;
}

.box{
    background:white;
    padding:40px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
    color:#ff4d6d;
}

button{
    border:none;
    padding:15px 30px;
    margin:15px;
    border-radius:50px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

#yes{
    background:#ff4d6d;
    color:white;
}

#no{
    background:#ffd166;
}

.message{
    margin-top:20px;
    font-size:20px;
    color:#444;
}
</style>

</head>
<body>

<div class="box">
    <h1>Are you upset with me? 🥺</h1>

    <button id="yes">Yes 😔</button>
    <button id="no">No ❤️</button>

    <div class="message" id="msg"></div>
</div>

<script>
const yesBtn = document.getElementById("yes");
const noBtn = document.getElementById("no");
const msg = document.getElementById("msg");

yesBtn.onclick = () => {
    msg.innerHTML =
    "I'm really sorry if I hurt you. 💔<br>Please tell me what happened, I want to make things right. 🫶";
};

noBtn.onclick = () => {
    msg.innerHTML =
    "Yay! 😍 I was worried for nothing. Thank you for always staying with me ❤️";
};

// Make the YES button run away (cute effect)
yesBtn.addEventListener("mouseover", () => {
    yesBtn.style.position = "absolute";
    yesBtn.style.left = Math.random() * 80 + "%";
    yesBtn.style.top = Math.random() * 80 + "%";
});
</script>

</body>
</html>
